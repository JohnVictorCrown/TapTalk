name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # ANDROID
  # ──────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pub get
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/app/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/app/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/app/key.properties

      - name: Build per-abi APKs
        run: >
          flutter build apk --release
          --split-per-abi
          --obfuscate
          --split-debug-info=debug/android/

      - name: Build AppBundle
        run: >
          flutter build appbundle --release
          --obfuscate
          --split-debug-info=debug/android/

      - name: Staging
        run: |
          mkdir -p staging
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk  "staging/TapTalk-${{ env.VERSION }}-android-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "staging/TapTalk-${{ env.VERSION }}-android-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk     "staging/TapTalk-${{ env.VERSION }}-android-x86_64.apk"
          cp build/app/outputs/bundle/release/app-release.aab         "staging/TapTalk-${{ env.VERSION }}-android.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: staging/

  # ──────────────────────────────────────────────
  # iOS
  # ──────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pub get
        run: flutter pub get

      - name: CocoaPods
        run: |
          gem install cocoapods --no-document --quiet
          pod repo update --silent

      - name: Build iOS
        run: >
          flutter build ios --release --no-codesign
          --obfuscate
          --split-debug-info=debug/ios/

      - name: Stage
        run: |
          ROOT=$PWD
          mkdir -p "$ROOT/staging"
          cd build/ios/iphoneos
          zip -ry "$ROOT/staging/TapTalk-${{ env.VERSION }}-ios.zip" *.app/

      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: staging/

  # ──────────────────────────────────────────────
  # WINDOWS
  # ──────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pub get
        run: flutter pub get

      - name: Build Windows
        run: >
          flutter build windows --release
          --obfuscate
          --split-debug-info=debug/windows/

      - name: Stage
        shell: bash
        run: |
          ROOT=$PWD
          mkdir -p "$ROOT/staging"
          cd build/windows/runner/Release
          7z a -tzip "$ROOT/staging/TapTalk-${{ env.VERSION }}-windows.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: staging/

  # ──────────────────────────────────────────────
  # LINUX
  # ──────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Pub get
        run: flutter pub get

      - name: Build Linux
        run: >
          flutter build linux --release
          --obfuscate
          --split-debug-info=debug/linux/

      - name: Stage
        run: |
          ROOT=$PWD
          mkdir -p "$ROOT/staging"
          ARCH=$(uname -m); [ "$ARCH" = "x86_64" ] && ARCH=x64
          cd "build/linux/$ARCH/release/bundle"
          tar czf "$ROOT/staging/TapTalk-${{ env.VERSION }}-linux-$(uname -m).tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: staging/

  # ──────────────────────────────────────────────
  # macOS
  # ──────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pub get
        run: flutter pub get

      - name: Build macOS
        run: >
          flutter build macos --release
          --obfuscate
          --split-debug-info=debug/macos/

      - name: Stage
        run: |
          ROOT=$PWD
          mkdir -p "$ROOT/staging"
          cd build/macos/Build/Products/Release
          zip -ry "$ROOT/staging/TapTalk-${{ env.VERSION }}-macos.zip" *.app/

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: staging/

  # ──────────────────────────────────────────────
  # CREATE RELEASE (collect all artifacts)
  # ──────────────────────────────────────────────
  create-release:
    name: Create Release
    needs: [build-android, build-ios, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Flatten release assets
        run: |
          mkdir -p release
          find android ios windows linux macos -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: TapTalk ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## TapTalk ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |---|---|
            | **Android** (Play Store) | `TapTalk-${{ steps.version.outputs.version }}-android.aab` |
            | **Android** (arm64-v8a) | `TapTalk-${{ steps.version.outputs.version }}-android-arm64-v8a.apk` |
            | **Android** (armeabi-v7a) | `TapTalk-${{ steps.version.outputs.version }}-android-armeabi-v7a.apk` |
            | **Android** (x86_64) | `TapTalk-${{ steps.version.outputs.version }}-android-x86_64.apk` |
            | **iOS** (unsigned) | `TapTalk-${{ steps.version.outputs.version }}-ios.zip` |
            | **Windows** | `TapTalk-${{ steps.version.outputs.version }}-windows.zip` |
            | **Linux** (x86_64) | `TapTalk-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz` |
            | **macOS** (unsigned) | `TapTalk-${{ steps.version.outputs.version }}-macos.zip` |
          files: |
            release/TapTalk-*.apk
            release/TapTalk-*.aab
            release/TapTalk-*.zip
            release/TapTalk-*.tar.gz
